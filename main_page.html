<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mpstyle.css">
    <title>Mangalyzer</title>
</head>

<body>

    <!-- Header -->
    <header>
        <div class="mangalyzer__container">
            <a href="#">
                <img id="mangalyzer__container-logo" src="Group 5.svg" alt="Logo da Mangalyzer" width="75" height="36">
            </a>
        </div>
        <input type="search" placeholder="Pesquise aqui seu mangá...">
    </header>

    <!-- Nav -->
    <nav>
        <div class="nav__button">Descubra</div>
        <div class="nav__button">Ranking</div>
        <div class="nav__button">Calendário</div>
        <div class="nav__button">Lançamentos</div>
        <div class="nav__button">Lyzer<span class="negrito">PLUS!</span></div>
    </nav>

    <!-- Main -->
    <main>

        <!-- HighlightCards Section -->
        <section class="section__highlightsCards">

            <h2 class="section__titleCards">
                <strong>DESTAQUES</strong> da semana! ❤️‍🔥
                </h2>
            <img class="highlight--img" src="Capas Manhwas\image.jpg" alt="Capa de Stellar Swordmaster">

        </section>

        <!-- PopularCards Section -->
        <section class="section__popularCards">

            <h2 class="section__titleCards">
                Os mais <span class="negrito">POPULARES!</span> 🏆
                </h2>
            <div class="section__containerCards">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 1.png" alt="Rise of the Dragon Overlord">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 2.png" alt="Necromancer: The ultimate scourge">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 3.png" alt="Eleceed">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 4.png" alt="Bailin & Li Yun">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 5.png" alt="Returned by the King">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 6.png" alt="Dungeon Crawler Carl">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 7.png" alt="Hand Jumper">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 8.png" alt="Surviving the Game as a Barbarian">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 9.png" alt="The Regressed Mercenary Has a Plan">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 10.png" alt="Teenage Mercenary">
                </div>

        </section>

        <!-- RecentlyUpdatedCards Section -->
        <section class="section__RecentlyUpdCards">

            <h2 class="section__titleCards">
                Recém <span class="negrito">atualizados...</span> 👀
                </h2>
            <div class="section__containerCards">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 11.png" alt="Rise of the Dragon Overlord">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 12.png" alt="Necromancer: The ultimate scourge">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 13.png" alt="Eleceed">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 14.png" alt="Bailin & Li Yun">
                <img class="popular--img" src="Capas Manhwas\capa manhwa 15.png" alt="Returned by the King">
                </div>

        </section>

    </main>

            <footer>

            Oi

        </footer>

</body>

</html>
